name: "02 - Platform: Logging & Monitoring"

on:
  push:
    branches: [main]
    paths:
      - 'platform/logging/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false   # Never cancel in-progress infra deployments — too risky

permissions:
  id-token: write
  contents: read

env:
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  MANAGEMENT_SUBSCRIPTION_ID: ${{ secrets.MANAGEMENT_SUBSCRIPTION_ID }}

jobs:
  lint:
    name: Bicep Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bicep lint
        run: az bicep build --file platform/logging/main.bicep

  what-if:
    name: What-If (Dry Run)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          client-id: ${{ env.AZURE_CLIENT_ID }}
          subscription-id: ${{ env.MANAGEMENT_SUBSCRIPTION_ID }}

      - name: What-If
        run: |
          az deployment sub what-if \
            --name "alz-logging-$(date +%Y%m%d%H%M%S)" \
            --location australiaeast \
            --subscription "${{ env.MANAGEMENT_SUBSCRIPTION_ID }}" \
            --template-file platform/logging/main.bicep

  deploy:
    name: Deploy Logging
    runs-on: ubuntu-latest
    needs: what-if
    environment: platform-production
    outputs:
      law-resource-id: ${{ steps.deploy.outputs.lawResourceId }}
    steps:
      - uses: actions/checkout@v4
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          client-id: ${{ env.AZURE_CLIENT_ID }}
          subscription-id: ${{ env.MANAGEMENT_SUBSCRIPTION_ID }}

      - name: Deploy Logging Stack
        id: deploy
        run: |
          OUTPUT=$(az deployment sub create \
            --name "alz-logging-$(date +%Y%m%d%H%M%S)" \
            --location australiaeast \
            --subscription "${{ env.MANAGEMENT_SUBSCRIPTION_ID }}" \
            --template-file platform/logging/main.bicep \
            --output json)

          echo "$OUTPUT" | tee deployment-output.json
          LAW_ID=$(echo "$OUTPUT" | jq -r '.properties.outputs.logAnalyticsWorkspaceId.value')
          echo "lawResourceId=$LAW_ID" >> "$GITHUB_OUTPUT"

      - name: Upload Output
        uses: actions/upload-artifact@v4
        with:
          name: logging-output
          path: deployment-output.json
