name: "03 - Platform: Connectivity (Hub VNet + Checkpoint NVA + ER Gateway)"

# ============================================================
# What this workflow deploys (IaC):
#   • Hub VNet (10.0.0.0/16) with subnets, NSGs, route table
#   • ExpressRoute Gateway — ErGw1AZ (zone-redundant)
#   • Checkpoint CloudGuard NVA (dual NIC, static IPs)
#
# What is NOT automated — manual steps required:
#   1. Create the ER circuit in Azure Portal / CLI
#   2. Send the service key to your provider (Equinix / Megaport)
#   3. Wait for provider to set circuit status → Provisioned
#   4. Run workflow 03b to link the gateway to the circuit
#
# See: docs/expressroute-setup.md for the full manual runbook
# ============================================================

on:
  push:
    branches: [main]
    paths:
      - 'platform/connectivity/**'
      - '!platform/connectivity/modules/er-connection.bicep'  # 03b handles this
  workflow_dispatch:
    inputs:
      checkpoint_sku:
        description: 'Checkpoint licence SKU'
        required: true
        default: 'sg-byol'
        type: choice
        options: [sg-byol, sg-ngtp, sg-ngtx]
      er_gateway_sku:
        description: 'ExpressRoute Gateway SKU'
        required: true
        default: 'ErGw1AZ'
        type: choice
        options: [ErGw1AZ, ErGw2AZ, ErGw3AZ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false   # Never cancel in-progress infra deployments — too risky

permissions:
  id-token: write
  contents: read

env:
  AZURE_TENANT_ID:              ${{ secrets.AZURE_TENANT_ID }}
  AZURE_CLIENT_ID:              ${{ secrets.AZURE_CLIENT_ID }}
  CONNECTIVITY_SUBSCRIPTION_ID: ${{ secrets.CONNECTIVITY_SUBSCRIPTION_ID }}
  CHECKPOINT_ADMIN_PASSWORD:    ${{ secrets.CHECKPOINT_ADMIN_PASSWORD }}
  LOG_ANALYTICS_WORKSPACE_ID:   ${{ secrets.LOG_ANALYTICS_WORKSPACE_ID }}

jobs:
  lint:
    name: Bicep Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint connectivity Bicep files
        run: |
          az bicep build --file platform/connectivity/main.bicep
          az bicep build --file platform/connectivity/modules/checkpoint-nva.bicep

  what-if:
    name: What-If Analysis
    runs-on: ubuntu-latest
    needs: lint
    environment: platform-production
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          tenant-id:       ${{ env.AZURE_TENANT_ID }}
          client-id:       ${{ env.AZURE_CLIENT_ID }}
          subscription-id: ${{ env.CONNECTIVITY_SUBSCRIPTION_ID }}

      - name: Install Bicep
        run: az bicep install

      - name: What-If — Hub Networking
        run: |
          az deployment sub what-if \
            --name "alz-connectivity-whatif-$(date +%Y%m%d%H%M%S)" \
            --location australiaeast \
            --subscription "${{ env.CONNECTIVITY_SUBSCRIPTION_ID }}" \
            --template-file platform/connectivity/main.bicep \
            --parameters platform/connectivity/parameters/hub-networking.bicepparam \
            --parameters \
              logAnalyticsWorkspaceId="${{ env.LOG_ANALYTICS_WORKSPACE_ID }}" \
              checkpointAdminPassword="${{ env.CHECKPOINT_ADMIN_PASSWORD }}" \
              checkpointSku="${{ github.event.inputs.checkpoint_sku || 'sg-byol' }}" \
              erGatewaySku="${{ github.event.inputs.er_gateway_sku || 'ErGw1AZ' }}" \
            2>&1 | tee whatif-output.txt

      - name: Upload What-If Output
        uses: actions/upload-artifact@v7
        with:
          name: connectivity-whatif-${{ github.run_id }}
          path: whatif-output.txt

  deploy:
    name: Deploy Hub VNet + ER Gateway + Checkpoint NVA
    runs-on: ubuntu-latest
    needs: [lint, what-if]
    environment: platform-production
    outputs:
      hub-vnet-id:    ${{ steps.deploy.outputs.hubVnetId }}
      route-table-id: ${{ steps.deploy.outputs.routeTableId }}
      er-gateway-id:  ${{ steps.deploy.outputs.erGatewayId }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          tenant-id:       ${{ env.AZURE_TENANT_ID }}
          client-id:       ${{ env.AZURE_CLIENT_ID }}
          subscription-id: ${{ env.CONNECTIVITY_SUBSCRIPTION_ID }}

      - name: Deploy Connectivity Stack
        id: deploy
        run: |
          OUTPUT=$(az deployment sub create \
            --name "alz-connectivity-$(date +%Y%m%d%H%M%S)" \
            --location australiaeast \
            --subscription "${{ env.CONNECTIVITY_SUBSCRIPTION_ID }}" \
            --template-file platform/connectivity/main.bicep \
            --parameters platform/connectivity/parameters/hub-networking.bicepparam \
            --parameters \
              logAnalyticsWorkspaceId="${{ env.LOG_ANALYTICS_WORKSPACE_ID }}" \
              checkpointAdminPassword="${{ env.CHECKPOINT_ADMIN_PASSWORD }}" \
              checkpointSku="${{ github.event.inputs.checkpoint_sku || 'sg-byol' }}" \
              erGatewaySku="${{ github.event.inputs.er_gateway_sku || 'ErGw1AZ' }}" \
            --output json)

          echo "$OUTPUT" | tee connectivity-output.json

          HUB_VNET_ID=$(echo "$OUTPUT"  | jq -r '.properties.outputs.hubVnetId.value')
          RT_ID=$(echo "$OUTPUT"        | jq -r '.properties.outputs.routeTableId.value')
          ERGW_ID=$(echo "$OUTPUT"      | jq -r '.properties.outputs.erGatewayId.value')

          echo "hubVnetId=$HUB_VNET_ID"   >> "$GITHUB_OUTPUT"
          echo "routeTableId=$RT_ID"      >> "$GITHUB_OUTPUT"
          echo "erGatewayId=$ERGW_ID"     >> "$GITHUB_OUTPUT"

      - name: Upload deployment output
        uses: actions/upload-artifact@v7
        with:
          name: connectivity-output
          path: connectivity-output.json

      # ── Post-deploy summary with manual next steps ────────────
      - name: Post-deploy summary
        run: |
          ERGW_ID=$(cat connectivity-output.json | jq -r '.properties.outputs.erGatewayId.value')
          HUB_ID=$(cat connectivity-output.json  | jq -r '.properties.outputs.hubVnetId.value')
          RT_ID=$(cat connectivity-output.json   | jq -r '.properties.outputs.routeTableId.value')

          cat >> $GITHUB_STEP_SUMMARY << SUMMARY
          ## ✅ Connectivity Stack Deployed

          | Resource | Value |
          |----------|-------|
          | Hub VNet ID | \`$HUB_ID\` |
          | ER Gateway ID | \`$ERGW_ID\` |
          | Route Table ID | \`$RT_ID\` |

          ---

          ## 🔧 Manual Steps Required Before Running Workflow 03b

          The **ExpressRoute circuit must be created manually** — it is not managed by IaC.
          Follow the runbook in [docs/expressroute-setup.md](../docs/expressroute-setup.md).

          ### Step 1 — Update GitHub Secrets
          Copy the output values above and set these repository secrets:

          | Secret | Value |
          |--------|-------|
          | \`HUB_VNET_ID\`   | (see Hub VNet ID above) |
          | \`ROUTE_TABLE_ID\` | (see Route Table ID above) |
          | \`ER_GATEWAY_ID\`  | (see ER Gateway ID above) |

          ### Step 2 — Create the ExpressRoute Circuit (Manual)
          1. Open Azure Portal → **ExpressRoute circuits → + Create**
          2. Fill in the details per the runbook
          3. Copy the **Service Key** shown on the Overview page
          4. Send the service key to your provider (Equinix / Megaport / Telstra)
          5. Wait for provider to set circuit status to **Provisioned** (typically 1–5 business days)

          ### Step 3 — Link Gateway to Circuit (Workflow 03b)
          Once the circuit is provisioned, run **workflow 03b** with the circuit resource ID.
          This creates the ER connection resource linking the gateway to your circuit.

          ### Step 4 — Checkpoint NVA Setup
          Connect via on-premises jump host over ER and complete the First Time Configuration wizard.
          See [README.md — Checkpoint CloudGuard NVA](../README.md#checkpoint-cloudguard-nva).
          SUMMARY

          echo "::notice title=Action Required::Update GitHub secrets (HUB_VNET_ID, ROUTE_TABLE_ID, ER_GATEWAY_ID) then create ER circuit manually. See docs/expressroute-setup.md"
