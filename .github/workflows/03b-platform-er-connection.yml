name: "03b - Platform: ExpressRoute Connection (Manual trigger only)"

# ============================================================
# PURPOSE
#   Creates the Azure connection resource that links the
#   ExpressRoute Gateway (deployed by workflow 03) to the
#   manually-created and provider-provisioned ER circuit.
#
# WHEN TO RUN
#   Run this workflow ONLY after ALL of the following are true:
#     ✅ Workflow 03 has completed successfully
#     ✅ ER circuit has been created manually in Azure Portal
#     ✅ Service key has been sent to the provider
#     ✅ Provider has set circuit provisioning status → Provisioned
#        (visible in Portal: ExpressRoute circuit → Overview →
#         Provider status: Provisioned)
#
# HOW TO RUN
#   Actions → "03b - Platform: ExpressRoute Connection" → Run workflow
#   Required input: ER circuit resource ID
#
# Reference: docs/expressroute-setup.md
# ============================================================

on:
  workflow_dispatch:
    inputs:
      er_circuit_resource_id:
        description: |
          ExpressRoute circuit resource ID (from Azure Portal:
          Circuit → Properties → Resource ID)
          Format: /subscriptions/<id>/resourceGroups/<rg>/providers/Microsoft.Network/expressRouteCircuits/<name>
        required: true
        type: string
      connection_name:
        description: 'Connection resource name (leave default unless creating a second connection)'
        required: false
        default: 'con-ergw-to-circuit-001'
        type: string
      routing_weight:
        description: 'BGP routing weight (0 = default preference)'
        required: false
        default: '0'
        type: string

permissions:
  id-token: write
  contents: read

env:
  AZURE_TENANT_ID:              ${{ secrets.AZURE_TENANT_ID }}
  AZURE_CLIENT_ID:              ${{ secrets.AZURE_CLIENT_ID }}
  CONNECTIVITY_SUBSCRIPTION_ID: ${{ secrets.CONNECTIVITY_SUBSCRIPTION_ID }}
  LOG_ANALYTICS_WORKSPACE_ID:   ${{ secrets.LOG_ANALYTICS_WORKSPACE_ID }}
  ER_GATEWAY_ID:                ${{ secrets.ER_GATEWAY_ID }}
  HUB_RESOURCE_GROUP:           'rg-connectivity-hub-australiaeast-001'

jobs:
  # ── Pre-flight: verify circuit is provisioned ───────────────
  preflight:
    name: Pre-flight — Verify Circuit is Provisioned
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          tenant-id:       ${{ env.AZURE_TENANT_ID }}
          client-id:       ${{ env.AZURE_CLIENT_ID }}
          subscription-id: ${{ env.CONNECTIVITY_SUBSCRIPTION_ID }}

      - name: Verify circuit provisioning status
        id: check
        run: |
          CIRCUIT_ID="${{ github.event.inputs.er_circuit_resource_id }}"

          # Validate ID format
          if [[ ! "$CIRCUIT_ID" =~ ^/subscriptions/.*/expressRouteCircuits/.* ]]; then
            echo "::error::Circuit resource ID format is invalid. Expected: /subscriptions/<id>/resourceGroups/<rg>/providers/Microsoft.Network/expressRouteCircuits/<name>"
            exit 1
          fi

          # Fetch circuit details
          CIRCUIT=$(az network express-route show --ids "$CIRCUIT_ID" --output json 2>&1)
          if [ $? -ne 0 ]; then
            echo "::error::Could not retrieve circuit. Check the resource ID and that the service principal has Reader access to the circuit's subscription."
            echo "$CIRCUIT"
            exit 1
          fi

          PROVIDER_STATUS=$(echo "$CIRCUIT" | jq -r '.serviceProviderProvisioningState')
          CIRCUIT_STATUS=$(echo "$CIRCUIT"  | jq -r '.circuitProvisioningState')
          CIRCUIT_NAME=$(echo "$CIRCUIT"    | jq -r '.name')

          echo "Circuit name            : $CIRCUIT_NAME"
          echo "Circuit provisioning    : $CIRCUIT_STATUS"
          echo "Provider provisioning   : $PROVIDER_STATUS"

          if [ "$PROVIDER_STATUS" != "Provisioned" ]; then
            echo "::error::Provider status is '$PROVIDER_STATUS' — must be 'Provisioned' before creating a connection. Contact your provider."
            exit 1
          fi

          if [ "$CIRCUIT_STATUS" != "Enabled" ]; then
            echo "::error::Circuit provisioning state is '$CIRCUIT_STATUS' — must be 'Enabled'."
            exit 1
          fi

          echo "✅ Circuit is provisioned and enabled — safe to proceed."

  lint:
    name: Bicep Lint
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - uses: actions/checkout@v4
      - run: az bicep build --file platform/connectivity/modules/er-connection.bicep

  what-if:
    name: What-If — ER Connection
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          tenant-id:       ${{ env.AZURE_TENANT_ID }}
          client-id:       ${{ env.AZURE_CLIENT_ID }}
          subscription-id: ${{ env.CONNECTIVITY_SUBSCRIPTION_ID }}

      - name: What-If ER Connection
        run: |
          az deployment group what-if \
            --name "er-connection-whatif-$(date +%Y%m%d%H%M%S)" \
            --resource-group "${{ env.HUB_RESOURCE_GROUP }}" \
            --template-file platform/connectivity/modules/er-connection.bicep \
            --parameters \
              erGatewayId="${{ env.ER_GATEWAY_ID }}" \
              erCircuitResourceId="${{ github.event.inputs.er_circuit_resource_id }}" \
              connectionName="${{ github.event.inputs.connection_name }}" \
              routingWeight="${{ github.event.inputs.routing_weight }}" \
              logAnalyticsWorkspaceId="${{ env.LOG_ANALYTICS_WORKSPACE_ID }}"

  deploy:
    name: Deploy ER Connection
    runs-on: ubuntu-latest
    needs: what-if
    environment: platform-production
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          tenant-id:       ${{ env.AZURE_TENANT_ID }}
          client-id:       ${{ env.AZURE_CLIENT_ID }}
          subscription-id: ${{ env.CONNECTIVITY_SUBSCRIPTION_ID }}

      - name: Create ER Connection
        id: deploy
        run: |
          OUTPUT=$(az deployment group create \
            --name "er-connection-$(date +%Y%m%d%H%M%S)" \
            --resource-group "${{ env.HUB_RESOURCE_GROUP }}" \
            --template-file platform/connectivity/modules/er-connection.bicep \
            --parameters \
              erGatewayId="${{ env.ER_GATEWAY_ID }}" \
              erCircuitResourceId="${{ github.event.inputs.er_circuit_resource_id }}" \
              connectionName="${{ github.event.inputs.connection_name }}" \
              routingWeight="${{ github.event.inputs.routing_weight }}" \
              logAnalyticsWorkspaceId="${{ env.LOG_ANALYTICS_WORKSPACE_ID }}" \
            --output json)

          echo "$OUTPUT" | tee er-connection-output.json
          CONN_ID=$(echo "$OUTPUT" | jq -r '.properties.outputs.erConnectionId.value')
          echo "connectionId=$CONN_ID" >> "$GITHUB_OUTPUT"

      - name: Upload output
        uses: actions/upload-artifact@v4
        with:
          name: er-connection-output
          path: er-connection-output.json

      - name: Post-deploy summary
        run: |
          CONN_ID=$(cat er-connection-output.json | jq -r '.properties.outputs.erConnectionId.value')
          cat >> $GITHUB_STEP_SUMMARY << SUMMARY
          ## ✅ ExpressRoute Connection Created

          | Detail | Value |
          |--------|-------|
          | Connection name | \`${{ github.event.inputs.connection_name }}\` |
          | Connection ID | \`$CONN_ID\` |
          | Circuit linked | \`${{ github.event.inputs.er_circuit_resource_id }}\` |

          ### Verify connectivity
          1. **Portal** → ExpressRoute circuit → Connections — status should show **Connected**
          2. **BGP routes** → Gateway → BGP peers — on-prem prefixes should appear
          3. **Ping test** — from on-prem host, ping an Azure VM in snet-management (10.0.2.x)
          4. **Checkpoint routing** — verify on-prem traffic flows through Checkpoint NVA
          SUMMARY

          echo "::notice title=ER Connection Created::Gateway is now linked to circuit. Verify BGP routes and test connectivity from on-prem."
