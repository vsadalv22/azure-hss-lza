# ============================================================
# Pipeline: 03 - Platform: Connectivity
# Deploys the Hub VNet (10.0.0.0/16), Ingress VNet (10.1.0.0/16),
# ExpressRoute Gateway (zone-redundant ErGw1AZ), NSGs, Route
# Tables, DDoS Protection Plan, and Private DNS Zones into the
# Connectivity subscription.
#
# ──────────────────────────────────────────────────────────────
# CHECKPOINT NVA — NOT DEPLOYED BY THIS PIPELINE
# ──────────────────────────────────────────────────────────────
# Checkpoint CloudGuard deployment is a MANUAL activity performed
# by the network team after this pipeline completes. The pipeline
# creates the necessary VNets, subnets, NSGs, and route tables
# as a pre-provisioned foundation for the NVA.
#
# Manual steps after this pipeline succeeds:
#   1. Review pipeline outputs for subnet IDs and the reserved
#      Checkpoint Internal LB IP (checkpointInternalIp output).
#   2. Deploy Checkpoint CloudGuard R81.10 from Azure Marketplace
#      into the two pre-created subnets:
#        eth0 → snet-checkpoint-external  (vnet-ingress-australiaeast-001)
#        eth1 → snet-checkpoint-internal  (vnet-hub-australiaeast-001)
#   3. Configure the Internal Load Balancer with frontend IP matching
#      the checkpointInternalIp output value.
#   4. See: docs/checkpoint-first-boot.md for cluster configuration.
# ──────────────────────────────────────────────────────────────
#
# Other manual steps required after this pipeline:
#   1. Create the ER circuit in Azure Portal / CLI
#   2. Send the service key to your provider (Equinix / Megaport)
#   3. Wait for provider to set circuit status to Provisioned
#   4. Run pipeline 03b to link the gateway to the circuit
#
# See: docs/expressroute-setup.md for the full ER manual runbook
#
# Deployment order: 01-management-groups → 02-logging → THIS → 06-platform-security → 03b-er-connection
# ============================================================

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - platform/connectivity/**
    exclude:
      - platform/connectivity/modules/er-connection.bicep   # 03b handles this

pr: none   # PRs to non-main branches must NOT trigger production pipelines

pool:
  vmImage: 'ubuntu-latest'

parameters:
  - name: erGatewaySku
    displayName: 'ExpressRoute Gateway SKU'
    type: string
    default: 'ErGw1AZ'
    values:
      - ErGw1AZ
      - ErGw2AZ
      - ErGw3AZ

  - name: deployPez
    displayName: 'Deploy Perth Extended Zone (PEZ) secondary hub'
    type: boolean
    default: false

variables:
  - group: alz-platform-secrets     # AZURE_TENANT_ID, AZURE_CLIENT_ID,
                                    # CONNECTIVITY_SUBSCRIPTION_ID, LOG_ANALYTICS_WORKSPACE_ID
  - group: alz-platform-variables   # Non-secret config values

# ============================================================
# STAGE 1 — LINT (automated)
# ============================================================
stages:
  - stage: Lint
    displayName: 'Stage 1 — Bicep Lint'
    jobs:
      - job: BicepLint
        displayName: 'Bicep Lint — Connectivity'
        steps:
          - checkout: self

          - task: AzureCLI@2
            displayName: 'Install Bicep CLI'
            inputs:
              azureSubscription: 'hss-platform-azure-sc'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az bicep install
                az bicep version

          - task: AzureCLI@2
            displayName: 'Lint connectivity Bicep templates'
            inputs:
              azureSubscription: 'hss-platform-azure-sc'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                echo "Linting main connectivity template..."
                az bicep build --file platform/connectivity/main.bicep

                echo "Linting PEZ template..."
                az bicep build --file platform/connectivity/pez/main.bicep

                echo "All lint checks passed."

  # ============================================================
  # STAGE 2 — WHAT-IF (automated, depends on Lint)
  # ============================================================
  - stage: WhatIf
    displayName: 'Stage 2 — What-If (Dry Run)'
    dependsOn: Lint
    condition: succeeded('Lint')
    jobs:
      - job: WhatIfDeployment
        displayName: 'What-If — Hub VNet + Ingress VNet + ER Gateway'
        steps:
          - checkout: self

          - task: AzureCLI@2
            displayName: 'What-If — Connectivity Stack'
            inputs:
              azureSubscription: 'hss-platform-azure-sc'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail

                DEPLOY_NAME="alz-connectivity-whatif-$(date +%Y%m%d%H%M%S)"
                echo "Running what-if: $DEPLOY_NAME"
                echo "Target subscription: $(CONNECTIVITY_SUBSCRIPTION_ID)"
                echo "ER Gateway SKU: ${{ parameters.erGatewaySku }}"

                az deployment sub what-if \
                  --name "$DEPLOY_NAME" \
                  --location australiaeast \
                  --subscription "$(CONNECTIVITY_SUBSCRIPTION_ID)" \
                  --template-file platform/connectivity/main.bicep \
                  --parameters platform/connectivity/parameters/hub-networking.bicepparam \
                  --parameters \
                    logAnalyticsWorkspaceId="$(LOG_ANALYTICS_WORKSPACE_ID)" \
                    erGatewaySku="${{ parameters.erGatewaySku }}" \
                  2>&1 | tee whatif-output.txt

                echo ""
                echo "What-if complete. Review changes above before approving deployment."

          - task: PublishPipelineArtifact@1
            displayName: 'Publish What-If output'
            condition: always()
            inputs:
              targetPath: whatif-output.txt
              artifactName: 'whatif-connectivity-$(Build.BuildNumber)'

  # ============================================================
  # STAGE 3 — DEPLOY (requires platform-production environment approval)
  # ============================================================
  - stage: Deploy
    displayName: 'Stage 3 — Deploy Connectivity Stack'
    dependsOn: WhatIf
    condition: succeeded('WhatIf')
    jobs:
      - deployment: DeployConnectivity
        displayName: 'Deploy — Hub VNet + Ingress VNet + ER Gateway'
        environment: platform-production
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: AzureCLI@2
                  timeoutInMinutes: 120
                  displayName: 'Deploy Connectivity Stack (subscription scope)'
                  name: DeployStep
                  inputs:
                    azureSubscription: 'hss-platform-azure-sc'
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -euo pipefail

                      DEPLOY_NAME="alz-connectivity-$(date +%Y%m%d%H%M%S)"
                      echo "##vso[task.setvariable variable=DEPLOY_NAME]$DEPLOY_NAME"
                      echo "Deployment name: $DEPLOY_NAME"
                      echo "Target subscription: $(CONNECTIVITY_SUBSCRIPTION_ID)"
                      echo "ER Gateway SKU: ${{ parameters.erGatewaySku }}"

                      OUTPUT=$(az deployment sub create \
                        --name "$DEPLOY_NAME" \
                        --location australiaeast \
                        --subscription "$(CONNECTIVITY_SUBSCRIPTION_ID)" \
                        --template-file platform/connectivity/main.bicep \
                        --parameters platform/connectivity/parameters/hub-networking.bicepparam \
                        --parameters \
                          logAnalyticsWorkspaceId="$(LOG_ANALYTICS_WORKSPACE_ID)" \
                          erGatewaySku="${{ parameters.erGatewaySku }}" \
                        --output json)

                      echo "$OUTPUT" | tee connectivity-output.json

                      # Extract outputs
                      HUB_VNET_ID=$(echo "$OUTPUT"          | jq -r '.properties.outputs.hubVnetId.value           // empty')
                      RT_ID=$(echo "$OUTPUT"                | jq -r '.properties.outputs.routeTableId.value         // empty')
                      ERGW_ID=$(echo "$OUTPUT"              | jq -r '.properties.outputs.erGatewayId.value          // empty')
                      MGMT_SUBNET_ID=$(echo "$OUTPUT"       | jq -r '.properties.outputs.managementSubnetId.value   // empty')
                      INT_SUBNET_ID=$(echo "$OUTPUT"        | jq -r '.properties.outputs.internalSubnetId.value     // empty')
                      EXT_SUBNET_ID=$(echo "$OUTPUT"        | jq -r '.properties.outputs.externalSubnetId.value     // empty')
                      CKP_INTERNAL_IP=$(echo "$OUTPUT"      | jq -r '.properties.outputs.checkpointInternalIp.value // empty')

                      echo "##[section]Deployment outputs:"
                      echo "  Hub VNet ID              : $HUB_VNET_ID"
                      echo "  Route Table ID           : $RT_ID"
                      echo "  ER Gateway ID            : $ERGW_ID"
                      echo "  Management Subnet ID     : $MGMT_SUBNET_ID"
                      echo "  Checkpoint Internal Subnet: $INT_SUBNET_ID"
                      echo "  Checkpoint External Subnet: $EXT_SUBNET_ID"
                      echo "  Reserved Checkpoint NVA IP: $CKP_INTERNAL_IP"

                      # Surface as pipeline output variables
                      echo "##vso[task.setvariable variable=hubVnetId;isOutput=true]$HUB_VNET_ID"
                      echo "##vso[task.setvariable variable=routeTableId;isOutput=true]$RT_ID"
                      echo "##vso[task.setvariable variable=erGatewayId;isOutput=true]$ERGW_ID"
                      echo "##vso[task.setvariable variable=managementSubnetId;isOutput=true]$MGMT_SUBNET_ID"

                - task: PublishPipelineArtifact@1
                  displayName: 'Publish deployment output'
                  condition: always()
                  inputs:
                    targetPath: connectivity-output.json
                    artifactName: 'connectivity-output-$(Build.BuildNumber)'

                - task: AzureCLI@2
                  displayName: 'Verify Deployment Health'
                  timeoutInMinutes: 10
                  condition: always()
                  inputs:
                    azureSubscription: 'hss-platform-azure-sc'
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -euo pipefail
                      STATUS=$(az deployment sub show \
                        --name "$DEPLOY_NAME" \
                        --subscription "$(CONNECTIVITY_SUBSCRIPTION_ID)" \
                        --query 'properties.provisioningState' -o tsv 2>/dev/null || echo "NotFound")
                      echo "Deployment status: $STATUS"
                      if [[ "$STATUS" != "Succeeded" ]]; then
                        echo "##vso[task.logissue type=error]Deployment ended with status: $STATUS"
                        echo "##vso[task.complete result=Failed]"
                      fi

                - bash: |
                    set -euo pipefail

                    HUB_ID=$(cat connectivity-output.json       | jq -r '.properties.outputs.hubVnetId.value           // "N/A"')
                    ERGW_ID=$(cat connectivity-output.json      | jq -r '.properties.outputs.erGatewayId.value          // "N/A"')
                    RT_ID=$(cat connectivity-output.json        | jq -r '.properties.outputs.routeTableId.value         // "N/A"')
                    MGMT_ID=$(cat connectivity-output.json      | jq -r '.properties.outputs.managementSubnetId.value   // "N/A"')
                    INT_SUBNET=$(cat connectivity-output.json   | jq -r '.properties.outputs.internalSubnetId.value     // "N/A"')
                    EXT_SUBNET=$(cat connectivity-output.json   | jq -r '.properties.outputs.externalSubnetId.value     // "N/A"')
                    CKP_IP=$(cat connectivity-output.json       | jq -r '.properties.outputs.checkpointInternalIp.value // "N/A"')

                    cat << SUMMARY
                    ============================================================
                    Connectivity Stack Deployed Successfully
                    ============================================================
                    Hub VNet ID              : $HUB_ID
                    ER Gateway ID            : $ERGW_ID
                    Route Table ID           : $RT_ID
                    Management Subnet ID     : $MGMT_ID
                    ============================================================

                    ACTION REQUIRED — Update 'alz-platform-secrets' variable group:
                    ============================================================
                      HUB_VNET_ID        = $HUB_ID
                      ER_GATEWAY_ID      = $ERGW_ID
                      ROUTE_TABLE_ID     = $RT_ID
                      MANAGEMENT_SUBNET_ID = $MGMT_ID

                    ============================================================
                    CHECKPOINT NVA — MANUAL DEPLOYMENT REQUIRED
                    ============================================================
                    The network team must manually deploy Checkpoint CloudGuard
                    into the pre-created subnets:

                      eth0 (external) subnet : $EXT_SUBNET
                      eth1 (internal) subnet : $INT_SUBNET

                    Reserved Internal LB frontend IP (assign to Checkpoint LB):
                      $CKP_IP

                    See: docs/checkpoint-first-boot.md for the full runbook.
                    ============================================================

                    NEXT AUTOMATED PIPELINE STEPS:
                    ============================================================
                    1. Run pipeline 06-platform-security (Key Vault + WORM storage)
                    2. After ER circuit is Provisioned, run pipeline 03b-er-connection
                    ============================================================
                    SUMMARY
                  displayName: 'Post-deploy summary and manual next steps'

  # ============================================================
  # STAGE 4 — PEZ (optional, manual trigger parameter)
  # ============================================================
  - stage: DeployPez
    displayName: 'Stage 4 — Deploy PEZ Secondary Hub (optional)'
    dependsOn: Deploy
    condition: and(succeeded('Deploy'), eq('${{ parameters.deployPez }}', true))
    jobs:
      - deployment: DeployPezHub
        displayName: 'Deploy — PEZ Hub VNet + ER Gateway (Perth Extended Zone)'
        environment: platform-production
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: AzureCLI@2
                  timeoutInMinutes: 120
                  displayName: 'Deploy PEZ Connectivity Stack'
                  inputs:
                    azureSubscription: 'hss-platform-azure-sc'
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -euo pipefail

                      # Retrieve the DDoS Protection Plan ID from the Australia East deployment
                      DDOS_PLAN_ID=$(az network ddos-protection show \
                        --name ddos-hub-australiaeast-001 \
                        --resource-group rg-connectivity-hub-australiaeast-001 \
                        --subscription "$(CONNECTIVITY_SUBSCRIPTION_ID)" \
                        --query id -o tsv)

                      echo "DDoS Plan ID: $DDOS_PLAN_ID"

                      DEPLOY_NAME="alz-connectivity-pez-$(date +%Y%m%d%H%M%S)"
                      echo "Deployment name: $DEPLOY_NAME"

                      OUTPUT=$(az deployment sub create \
                        --name "$DEPLOY_NAME" \
                        --location australiaeast \
                        --subscription "$(CONNECTIVITY_SUBSCRIPTION_ID)" \
                        --template-file platform/connectivity/pez/main.bicep \
                        --parameters \
                          logAnalyticsWorkspaceId="$(LOG_ANALYTICS_WORKSPACE_ID)" \
                          ddosProtectionPlanId="$DDOS_PLAN_ID" \
                        --output json)

                      echo "$OUTPUT" | tee pez-output.json

                      PEZ_HUB_ID=$(echo "$OUTPUT"   | jq -r '.properties.outputs.hubVnetId.value  // "N/A"')
                      PEZ_ERGW_ID=$(echo "$OUTPUT"  | jq -r '.properties.outputs.erGatewayId.value // "N/A"')
                      PEZ_CKP_IP=$(echo "$OUTPUT"   | jq -r '.properties.outputs.checkpointInternalIp.value // "N/A"')

                      echo "PEZ Hub VNet ID  : $PEZ_HUB_ID"
                      echo "PEZ ER Gateway ID: $PEZ_ERGW_ID"
                      echo ""
                      echo "CHECKPOINT NVA (PEZ) — MANUAL DEPLOYMENT REQUIRED"
                      echo "  Reserved Internal LB IP: $PEZ_CKP_IP"
                      echo "  See: docs/checkpoint-first-boot.md"

                - task: PublishPipelineArtifact@1
                  displayName: 'Publish PEZ deployment output'
                  condition: always()
                  inputs:
                    targetPath: pez-output.json
                    artifactName: 'pez-output-$(Build.BuildNumber)'
