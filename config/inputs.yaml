# ============================================================
# Azure Landing Zone Bicep Accelerator — Input Configuration
# Region   : Australia East
# Topology : Hub & Spoke
# WAN Edge : ExpressRoute (Standard / UnlimitedData)
# NVA      : Checkpoint CloudGuard
# SIEM     : Microsoft Sentinel
# NOTE     : Azure Bastion is NOT deployed — management access
#            is via on-premises jump hosts over ExpressRoute
# ============================================================

# ---- Core Settings ----
azure_location: australiaeast
root_management_group_display_name: "Azure Landing Zones"
root_management_group_id: alz

# ---- Subscription IDs (EA — fill in after subscriptions are created) ----
subscription_id_management:   ""    # Management / SOC subscription
subscription_id_connectivity: ""    # Connectivity / Networking subscription
subscription_id_identity:     ""    # Identity (AD DS) subscription

# ---- EA Billing (Enterprise Agreement) ----
billing_account_name:    ""         # EA Billing Account ID  (e.g. 12345678)
enrollment_account_name: ""         # EA Enrollment Account  (e.g. 987654)

# ---- Management Group Hierarchy ----
management_group_settings:
  root_id: "alz"
  platform_id: "platform"
  landing_zones_id: "landingzones"
  sandbox_id: "sandbox"
  decommissioned_id: "decommissioned"
  platform_children:
    - id: "management"
      display_name: "Management"
    - id: "connectivity"
      display_name: "Connectivity"
    - id: "identity"
      display_name: "Identity"
  landing_zone_children:
    - id: "corp"
      display_name: "Corp"
    - id: "online"
      display_name: "Online"

# ---- Networking (Hub & Spoke — no Bastion) ----
network_settings:
  type: hubNetworking
  hub_vnet_name: "vnet-hub-australiaeast-001"
  hub_vnet_address_prefix: "10.0.0.0/16"
  hub_location: australiaeast
  bastion_enabled: false            # Access via ExpressRoute from on-prem

  subnets:
    - name: "snet-checkpoint-external"
      address_prefix: "10.0.0.0/28"
    - name: "snet-checkpoint-internal"
      address_prefix: "10.0.1.0/28"
    - name: "snet-management"
      address_prefix: "10.0.2.0/24"
    - name: "GatewaySubnet"
      address_prefix: "10.0.3.0/27"   # ExpressRoute Gateway

  # Checkpoint CloudGuard NVA
  checkpoint_nva:
    enabled: true
    vm_name: "vm-checkpoint-hub-001"
    vm_size: "Standard_D3_v2"
    admin_username: "azureadmin"
    os_disk_type: "Premium_LRS"
    publisher: "checkpoint"
    offer: "check-point-cg-r8110"
    sku: "sg-byol"                    # sg-byol | sg-ngtp | sg-ngtx
    version: "latest"
    internal_ip: "10.0.1.4"           # Static — referenced in UDR

  # ExpressRoute
  # NOTE: The circuit itself is created MANUALLY by the network team.
  #       See docs/expressroute-setup.md for the full runbook.
  #       Only the Gateway (Azure resource) is deployed by IaC.
  expressroute:
    # ── Deployed by IaC (workflow 03) ──────────────────────────
    gateway_name: "ergw-hub-australiaeast-001"
    gateway_sku: "ErGw1AZ"           # Zone-redundant; ErGw2AZ for 10G

    # ── Created MANUALLY (not in code) ─────────────────────────
    # circuit_name: "erc-hub-australiaeast-001"
    # service_provider: ""           # e.g. Equinix, Megaport, Telstra
    # peering_location: "Sydney"     # ER peering location (NOT Azure region)
    # bandwidth_mbps: 1000           # 1 Gbps — upgradeable without downtime
    # sku_tier: "Standard"
    # sku_family: "UnlimitedData"

    # ── Deployed by IaC once circuit is provisioned (workflow 03b) ──
    # connection_name: "con-ergw-to-circuit-001"
    # routing_weight: 0

  # ---- DD31: Dual Security VNet (Ingress / DMZ) ----
  ingress_vnet:
    name: "vnet-ingress-australiaeast-001"
    address_prefix: "10.1.0.0/16"
    subnets:
      - name: "snet-checkpoint-external"
        address_prefix: "10.1.0.0/28"
      - name: "snet-ingress-dmz"
        address_prefix: "10.1.1.0/24"

  # ---- DD34: DDoS Protection Standard ----
  ddos_protection:
    enabled: true
    plan_name: "ddos-plan-australiaeast-001"
    # NOTE: DDoS Protection Standard has a flat monthly cost (~$2,944 AUD/month)
    # Apply to internet-facing hub VNets only

# ---- Perth Extended Zone (PEZ) — Secondary Location ----
# DD17: PEZ provides a secondary deployment point closer to WA Health datacentres
# DD22: PEZ uses single fault domain — no Availability Zone support
pez_settings:
  enabled: true
  edge_zone: "perth"           # Azure Extended Zone name for Perth
  hub_vnet_name: "vnet-hub-pez-001"
  hub_vnet_address_prefix: "10.2.0.0/16"
  ingress_vnet_name: "vnet-ingress-pez-001"
  ingress_vnet_address_prefix: "10.3.0.0/16"
  gateway_name: "ergw-hub-pez-001"
  gateway_sku: "ErGw1"         # No AZ suffix — PEZ single fault domain (DD22)
  expressroute:
    # ── Deployed by IaC ───────────────────────────────────────
    gateway_name: "ergw-hub-pez-001"
    gateway_sku: "ErGw1"       # Standard, no zone-redundancy in PEZ
    # ── Created MANUALLY (not in code) ────────────────────────
    # circuit_name: "erc-hub-pez-001"
    # peering_location: "Perth"   # ER Direct location
    # nextdc_facility: "P1"       # NextDC P1 Perth (primary) or P2 (secondary)

# ---- Logging & Monitoring ----
logging_settings:
  log_analytics_workspace_name: "law-management-australiaeast-001"
  log_analytics_sku: "PerGB2018"
  log_analytics_retention_days: 365
  automation_account_name: "aa-management-australiaeast-001"

# ---- Microsoft Sentinel ----
sentinel_settings:
  enabled: true
  workspace: "law-management-australiaeast-001"   # Same LAW as logging
  daily_quota_gb: -1                               # -1 = no cap
  retention_days: 365
  ueba_enabled: true
  ueba_data_sources:
    - AuditLogs
    - AzureActivity
    - SecurityEvent
    - SigninLogs
  data_connectors:
    - AzureActiveDirectory
    - AzureActivity
    - AzureSecurityCenter          # Defender for Cloud
    - MicrosoftThreatProtection    # Defender XDR
    - MicrosoftDefenderAdvancedThreatProtection
    - AzureAdvancedThreatProtection
    - Office365
    - ThreatIntelligence
  analytics_rules:
    - ImpossibleTravel
    - PrivilegeEscalation
    - MassResourceDeletion
    - NvaConfigChange
    - PasswordSpray
    - HspCrossTenantResourceAccess  # DD40

# ---- Identity ----
identity_settings:
  vnet_name: "vnet-identity-australiaeast-001"
  vnet_address_prefix: "10.10.0.0/16"
  subnets:
    - name: "snet-domain-controllers"
      address_prefix: "10.10.0.0/24"

# ---- Subscription Vending ----
subscription_vending:
  enabled: true
  management_group_association_enabled: true
  virtual_network_enabled: true
  virtual_network_peering_enabled: true
  role_assignment_enabled: true
  default_route_via_checkpoint: true    # UDR 0.0.0.0/0 -> Checkpoint internal IP
  tags:
    environment: "production"
    managed_by: "platform-team"

# ---- Health Service Provider (HSP) Configuration ----
# Used for Sentinel data segregation (DD40) and policy tagging
hsp_settings:
  enabled: true
  hsp_list:
    - id: "perth-childrens"
      display_name: "Perth Children's Hospital"
    - id: "fiona-stanley"
      display_name: "Fiona Stanley Hospital"
    - id: "rpbg"
      display_name: "Royal Perth Bentley Group"
    - id: "smhs"
      display_name: "South Metropolitan Health Service"
    - id: "nmhs"
      display_name: "North Metropolitan Health Service"

# ---- CI/CD Platform — Azure DevOps ----
# DD03: ADO is the mandated enterprise DevSecOps platform
# GitHub Actions files are retained for reference only
devops_settings:
  platform: "azure-devops"
  organization: ""             # e.g. https://dev.azure.com/wahealthhss
  project: ""                  # e.g. azure-cloud-platform
  service_connection: "hss-platform-azure-sc"
  pipeline_directory: "azure-pipelines"
